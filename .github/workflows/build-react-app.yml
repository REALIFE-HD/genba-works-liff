name: Build React app (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "react-app/**"
      - ".github/workflows/build-react-app.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: react-app/package-lock.json
      - run: npm ci
        working-directory: react-app
      - run: npm run build
        working-directory: react-app
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: build React app to app/"
          file_pattern: app/**
