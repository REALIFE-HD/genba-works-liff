<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>現場WORKS 打刻</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{--line:#06c755;--warn:#e8453c;--ink:#1f2328;--sub:#6b7280;--bd:#e4e7eb;--ok:#0a8f4f}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;background:#eef1f4;color:var(--ink);padding:16px;max-width:480px;margin:0 auto}
h1{font-size:16px;margin:6px 2px 14px;display:flex;align-items:center;gap:8px}
.who{margin-left:auto;font-size:12px;color:var(--sub);font-weight:600}
.card{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:14px}
.step{font-size:12px;color:var(--sub);font-weight:700;display:block;margin:0 2px 10px}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;padding:6px 12px;border-radius:99px}
.b-ok{background:#e6f7ee;color:var(--ok)}.b-mut{background:#f3f4f6;color:var(--sub)}
.site{font-size:18px;font-weight:800;margin-top:10px}
.btn{display:block;width:100%;border:0;border-radius:14px;padding:18px;font-size:17px;font-weight:800;cursor:pointer;margin-top:10px}
.btn-scan{background:#11181c;color:#fff}
.btn-in{background:var(--line);color:#fff}.btn-out{background:var(--warn);color:#fff}
.btn:active{filter:brightness(.95)}.btn:disabled{opacity:.4}
.log{font-size:12.5px;line-height:1.6;background:#11181c;color:#cfe;border-radius:12px;padding:12px;white-space:pre-wrap;word-break:break-all;min-height:48px}
.note{font-size:11.5px;color:var(--sub);text-align:center;margin-top:10px}
.err{color:#ff9a93;font-weight:700}
.uid{font-size:12px;background:#fff7e6;border:1px solid #ffe3a3;border-radius:10px;padding:10px;margin-top:10px;word-break:break-all;display:none}
</style>
</head>
<body>
<h1>👷 現場WORKS 打刻 <span class="who" id="who">…</span></h1>

<div class="card">
  <span class="step">① 現場のQRコードを読み取る</span>
  <button class="btn btn-scan" onclick="scanQR()">▦ QRコードを読み取る</button>
  <div class="site" id="siteLabel"><span class="badge b-mut">未読取</span></div>
</div>

<div class="card">
  <span class="step">② 打刻する</span>
  <button class="btn btn-in" id="inBtn" onclick="punch('in')" disabled>入場を打刻</button>
  <button class="btn btn-out" id="outBtn" onclick="punch('out')" disabled>退場を打刻</button>
</div>

<div class="card">
  <span class="step">状態</span>
  <div class="log" id="log">初期化中…</div>
  <div class="uid" id="uid"></div>
</div>
<div class="note">公式LINEミニアプリ / 打刻はSupabaseへ記録</div>

<script>
var LIFF_ID = "2010459645-nZrNO9J0";
var PUNCH_URL = "https://cdrobplodkxyagzyzvpq.supabase.co/functions/v1/punch";
var ANON_KEY = "sb_publishable_cEnH7Mug8B7O8JtgSIauMw_MjlVxhW5";
var idToken = null, qr = null;

function log(m, e){ document.getElementById('log').innerHTML = e ? '<span class="err">'+m+'</span>' : m; }
function showUid(u){ var el=document.getElementById('uid'); el.style.display='block'; el.innerHTML='あなたのLINE userId（未登録なら監督に伝えて登録）:<br><b>'+u+'</b>'; }
function setButtons(on){ document.getElementById('inBtn').disabled=!on; document.getElementById('outBtn').disabled=!on; }

async function boot(){
  try{
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    var p = await liff.getProfile();
    document.getElementById('who').textContent = p.displayName + " さん";
    idToken = liff.getIDToken();
    showUid(p.userId);
    log("現場のQRコードを読み取ってください。");
  }catch(e){ log("LIFF初期化エラー: " + (e && e.message ? e.message : e), 1); }
}

async function scanQR(){
  try{
    if(!liff.scanCodeV2){ log("QRが使えません。ミニアプリ設定の「Scan QR」をONにしてください。", 1); return; }
    var r = await liff.scanCodeV2();
    qr = r.value;
    document.getElementById('siteLabel').innerHTML = '<span class="badge b-ok">✓ QR読取済</span>';
    setButtons(true);
    log("QR読取OK。入場または退場を押してください。");
  }catch(e){ log("QR読取失敗: " + (e && e.message ? e.message : e), 1); }
}

async function punch(type){
  if(!idToken){ log("LINEログインが必要です。", 1); return; }
  if(!qr){ log("先に現場のQRコードを読み取ってください。", 1); return; }
  setButtons(false);
  log((type==='in'?'入場':'退場') + "を送信中…");
  try{
    var res = await fetch(PUNCH_URL, {
      method: "POST",
      headers: { "Content-Type":"application/json", "apikey":ANON_KEY, "Authorization":"Bearer "+ANON_KEY },
      body: JSON.stringify({ id_token: idToken, type: type, method: "qr", qr_token: qr })
    });
    var j = await res.json();
    if(j.ok){
      document.getElementById('siteLabel').innerHTML = '<span class="badge b-ok">✓ '+(j.site||'現場')+'</span>';
      log("✅ " + (j.site||'') + " " + (type==='in'?'入場':'退場') + "を記録しました\n" + new Date(j.attendance.occurred_at).toLocaleString('ja-JP'));
      setButtons(true);
    } else if(j.error === 'worker_not_found'){
      log("❌ 未登録の職人です。下記userIdを監督に伝えて登録してもらってください。", 1);
      if(j.line_user_id) showUid(j.line_user_id);
    } else if(j.error === 'qr_invalid' || j.error === 'no_qr'){
      log("❌ このQRコードは現場に登録されていません。掲示のQRを読み取ってください。", 1);
      setButtons(true);
    } else {
      log("❌ 失敗: " + (j.error || JSON.stringify(j)), 1);
      setButtons(true);
    }
  }catch(e){ log("通信エラー: " + (e && e.message ? e.message : e), 1); setButtons(true); }
}

boot();
</script>
</body>
</html>
